services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rewind
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: pnpm -F @rewind/dashboard start
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/rewind
      - API_URL=http://api:3002
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: pnpm -F @rewind/api start
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/rewind
      - JWT_SECRET=super-secret-key-prod
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - postgres

  ingestor:
    build:
      context: .
      dockerfile: Dockerfile
    command: pnpm -F @rewind/ingestor start
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/rewind
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: pnpm -F @rewind/worker start
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/rewind
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
